<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medical Article Writer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --secondary: #64748b;
      --bg: #f1f5f9;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #94a3b8;
      --success: #22c55e;
      --ai: #7c3aed;
      --ai-light: #f5f3ff;
      --ai-border: #ddd6fe;
      --pubmed: #0369a1;
      --pubmed-light: #f0f9ff;
      --pubmed-border: #bae6fd;
    }

    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Header ── */
    header {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-weight: 700; font-size: 1.05rem; color: var(--ai); }
    .logo span { color: var(--text); font-weight: 400; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .total-wc { font-size: 0.8rem; color: var(--muted); background: var(--bg); padding: 4px 10px; border-radius: 20px; white-space: nowrap; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 8px; font-size: 0.875rem;
      font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; white-space: nowrap;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--bg); }
    .btn-ai { background: var(--ai); color: #fff; }
    .btn-ai:hover { background: #6d28d9; }
    .btn-outline { background: transparent; color: var(--ai); border: 1px solid var(--ai-border); }
    .btn-outline:hover { background: var(--ai-light); }
    .btn-sm { padding: 5px 10px; font-size: 0.8rem; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Layout ── */
    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; max-width: 1500px; margin: 0 auto; }
    @media (max-width: 960px) { .layout { grid-template-columns: 1fr; } }

    /* ── Panel ── */
    .panel { background: var(--card); border-radius: 12px; border: 1px solid var(--border); }
    .panel-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .panel-title { font-weight: 600; font-size: 0.95rem; }
    .panel-body { padding: 16px 18px; }

    label { display: block; font-size: 0.82rem; font-weight: 500; margin-bottom: 4px; color: var(--secondary); }
    input, textarea, select {
      width: 100%; padding: 8px 11px; border: 1px solid var(--border);
      border-radius: 7px; font-size: 0.875rem; font-family: inherit;
      background: var(--card); color: var(--text); transition: border-color 0.15s;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--primary); }
    textarea { resize: vertical; line-height: 1.5; }
    .form-group { margin-bottom: 12px; }

    /* ── Accordion Sections ── */
    .section-panel {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; margin-bottom: 8px; overflow: hidden;
    }
    .section-head {
      padding: 11px 16px; display: flex; align-items: center;
      justify-content: space-between; cursor: pointer; user-select: none;
      transition: background 0.15s;
    }
    .section-head:hover { background: #f8fafc; }
    .section-head-left { display: flex; align-items: center; gap: 8px; }
    .section-toggle {
      font-size: 0.65rem; color: var(--muted); display: inline-block;
      width: 12px; transition: transform 0.2s;
    }
    .section-panel.open .section-toggle { transform: rotate(90deg); }
    .section-num { color: var(--muted); font-size: 0.82rem; font-weight: 600; }
    .section-name { font-weight: 600; font-size: 0.88rem; }
    .section-wc { font-size: 0.72rem; color: var(--muted); background: var(--bg); padding: 2px 8px; border-radius: 10px; }
    .section-body { display: none; padding: 0 14px 14px; }
    .section-panel.open .section-body { display: block; }

    .notes-input {
      width: 100%; padding: 6px 10px; border: 1px dashed var(--border);
      border-radius: 6px; font-size: 0.8rem; font-family: inherit;
      background: #fffbf0; color: var(--secondary); margin-bottom: 10px;
    }
    .notes-input:focus { outline: none; border-color: var(--ai); border-style: solid; }
    .notes-input::placeholder { color: var(--muted); }

    .section-ai-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }

    /* ── AI Box ── */
    .ai-box {
      background: var(--ai-light); border: 1px solid var(--ai-border);
      border-radius: 8px; padding: 12px 14px; margin-top: 10px;
      font-size: 0.84rem; line-height: 1.6; display: none;
    }
    .ai-box.visible { display: block; }
    .ai-box-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px; font-weight: 600; color: var(--ai); font-size: 0.8rem;
    }
    .ai-box-content { white-space: pre-wrap; color: var(--text); max-height: 300px; overflow-y: auto; }
    .ai-box-actions { display: flex; gap: 6px; margin-top: 10px; }
    .ai-loading { color: var(--ai); font-style: italic; }

    /* ── Preview ── */
    .right-col { position: sticky; top: 76px; height: calc(100vh - 96px); display: flex; flex-direction: column; }
    .preview-wrapper { overflow-y: auto; flex: 1; background: #e8e8e8; padding: 16px; }
    #article-preview {
      background: #fff; padding: 52px 56px;
      font-family: "Times New Roman", Times, serif;
      font-size: 11pt; line-height: 1.65; color: #111;
      min-height: 297mm; max-width: 210mm; margin: 0 auto;
      box-shadow: 0 2px 16px rgba(0,0,0,0.12);
    }
    .p-title { font-size: 17pt; font-weight: bold; text-align: center; line-height: 1.3; margin-bottom: 10px; }
    .p-authors { font-size: 10.5pt; font-style: italic; text-align: center; color: #333; margin-bottom: 6px; }
    .p-abstract-box { background: #f7f7f7; border: 1px solid #ddd; border-radius: 3px; padding: 14px 18px; margin: 14px 0; }
    .p-abstract-label { font-weight: bold; font-size: 10.5pt; margin-bottom: 5px; }
    .p-keywords { font-size: 9.5pt; color: #444; margin-bottom: 20px; border-top: 1px solid #eee; padding-top: 8px; }
    .p-section-title { font-size: 12pt; font-weight: bold; margin-top: 22px; margin-bottom: 7px; padding-bottom: 3px; border-bottom: 1.5px solid #222; page-break-after: avoid; page-break-inside: avoid; }
    .p-body { font-size: 10.5pt; text-align: justify; margin-bottom: 7px; white-space: pre-wrap; page-break-inside: avoid; }
    .p-abstract-box { page-break-inside: avoid; }
    .p-empty { text-align: center; color: #94a3b8; margin-top: 80px; font-family: sans-serif; font-size: 14px; }

    /* ── PubMed ── */
    .pubmed-panel {
      background: var(--pubmed-light); border: 1px solid var(--pubmed-border);
      border-radius: 8px; padding: 12px 14px; margin-bottom: 12px;
    }
    .pubmed-search-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .pubmed-search-row input { flex: 1; }
    .btn-pubmed { background: var(--pubmed); color: #fff; }
    .btn-pubmed:hover { background: #075985; }
    .pubmed-results { max-height: 260px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
    .pubmed-article {
      background: #fff; border: 1px solid var(--pubmed-border);
      border-radius: 6px; padding: 10px 12px; font-size: 0.8rem;
    }
    .pubmed-article-title { font-weight: 600; color: var(--pubmed); margin-bottom: 3px; line-height: 1.4; }
    .pubmed-article-meta { color: var(--muted); font-size: 0.75rem; margin-bottom: 5px; }
    .pubmed-article-abstract { color: var(--text); line-height: 1.5; max-height: 80px; overflow: hidden; position: relative; }
    .pubmed-article-abstract.expanded { max-height: none; }
    .pubmed-expand { color: var(--pubmed); cursor: pointer; font-size: 0.75rem; text-decoration: underline; display: inline-block; margin-top: 3px; }
    .pubmed-use-btn { margin-top: 6px; }
    .pubmed-empty { color: var(--muted); font-size: 0.82rem; text-align: center; padding: 16px 0; }
    .pubmed-section-label { font-size: 0.78rem; font-weight: 600; color: var(--pubmed); margin-bottom: 8px; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px; background: #1e293b; color: #fff;
      padding: 10px 18px; border-radius: 8px; font-size: 0.875rem;
      z-index: 9999; transform: translateY(60px); opacity: 0; transition: all 0.3s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #15803d; }
    .toast.error { background: #dc2626; }
  </style>
</head>
<body>

<header>
  <div class="logo">Medical <span>Article Writer</span></div>
  <div class="header-right">
    <span class="total-wc" id="total-wc">0 words</span>
    <button class="btn btn-secondary" onclick="clearAll()">Clear All</button>
    <button class="btn btn-secondary" onclick="downloadDOCX()">⬇ DOCX</button>
    <button class="btn btn-primary" onclick="downloadPDF()">⬇ PDF</button>
  </div>
</header>

<div class="layout">

  <!-- LEFT: Form -->
  <div>

    <!-- Article metadata -->
    <div class="panel" style="margin-bottom:12px">
      <div class="panel-header"><span class="panel-title">Article Details</span></div>
      <div class="panel-body">
        <div class="form-group">
          <label>Medical Topic <span style="font-weight:400;color:var(--muted)">(used to guide all AI generation)</span></label>
          <input type="text" id="medical-topic" placeholder="e.g., Multiple Myeloma, Chronic Lymphocytic Leukemia, Lupus Nephritis..." oninput="updateMeta()" />
        </div>
        <div class="form-group">
          <label>Article Title</label>
          <input type="text" id="article-title" placeholder="e.g., Multiple Myeloma: A Comprehensive Review of Pathophysiology, Diagnosis, and Emerging Therapies" oninput="updateMeta()" />
        </div>
        <div class="form-group">
          <label>Authors &amp; Affiliations</label>
          <textarea id="authors" rows="2" placeholder="e.g., John Smith¹, Jane Doe²&#10;¹Dept. of Hematology, University Hospital | ²Cancer Institute, Medical Center" oninput="updateMeta()"></textarea>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label>Keywords <span style="font-weight:400;color:var(--muted)">(comma-separated)</span></label>
          <input type="text" id="keywords" placeholder="Multiple myeloma, plasma cell disorder, IMiD, proteasome inhibitor, CAR-T, bispecific antibody" oninput="updateMeta()" />
        </div>
      </div>
    </div>

    <!-- PubMed search -->
    <div class="panel" style="margin-bottom:12px">
      <div class="panel-header">
        <span class="panel-title">PubMed Search</span>
        <span style="font-size:0.78rem;color:var(--muted)">Find references to ground AI generation</span>
      </div>
      <div class="panel-body" style="padding-bottom:12px">
        <div class="pubmed-search-row">
          <input type="text" id="pubmed-query" placeholder="Search PubMed (uses topic if blank)..." onkeydown="if(event.key==='Enter')searchPubMed()" />
          <button class="btn btn-pubmed btn-sm" onclick="searchPubMed()" id="pubmed-btn">Search</button>
        </div>
        <div id="pubmed-results" class="pubmed-results">
          <div class="pubmed-empty">Search PubMed for references. Results will appear here.</div>
        </div>
      </div>
    </div>

    <!-- Article sections (accordion) -->
    <div id="sections-container"></div>

  </div>

  <!-- RIGHT: Preview -->
  <div class="panel right-col">
    <div class="panel-header">
      <span class="panel-title">Article Preview</span>
      <button class="btn btn-primary btn-sm" onclick="downloadPDF()">⬇ PDF</button>
    </div>
    <div class="preview-wrapper">
      <div id="article-preview">
        <div class="p-empty">Fill in the details on the left to preview your article here.</div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── Section definitions ──
const SECTIONS = [
  { id: "abstract",         num: "",    title: "Abstract",                              placeholder: "Structured abstract: Background, Key Findings, Conclusions (250–350 words)..." },
  { id: "introduction",     num: "1",   title: "Introduction",                          placeholder: "Disease background, clinical burden, rationale for the review..." },
  { id: "epidemiology",     num: "2",   title: "Epidemiology & Risk Factors",           placeholder: "Incidence, prevalence, demographic trends, risk factors..." },
  { id: "pathophysiology",  num: "3",   title: "Pathophysiology & Molecular Biology",   placeholder: "Clonal plasma cell proliferation, genetic alterations, tumor microenvironment..." },
  { id: "diagnosis",        num: "4",   title: "Clinical Presentation & Diagnosis",     placeholder: "CRAB/SLiM-CRAB criteria, diagnostic workup, imaging..." },
  { id: "staging",          num: "5",   title: "Staging & Risk Stratification",         placeholder: "ISS, R-ISS, cytogenetic risk categories..." },
  { id: "treatment_nd",     num: "6",   title: "Treatment: Newly Diagnosed MM",         placeholder: "Transplant-eligible vs ineligible pathways, induction, ASCT, maintenance..." },
  { id: "treatment_rr",     num: "7",   title: "Treatment: Relapsed/Refractory MM",     placeholder: "Salvage regimens, drug sequencing, landmark trials..." },
  { id: "novel_therapies",  num: "8",   title: "Novel Therapies & Emerging Treatments", placeholder: "CAR-T cells, bispecific antibodies, novel targets, ADCs..." },
  { id: "supportive_care",  num: "9",   title: "Supportive Care & Complications",       placeholder: "Bone disease, renal failure, infections, VTE, anemia management..." },
  { id: "future_directions",num: "10",  title: "Future Directions",                     placeholder: "MRD-guided therapy, ongoing trials, research priorities..." },
  { id: "conclusion",       num: "11",  title: "Conclusion",                            placeholder: "Summary of advances, remaining challenges, clinical implications..." },
  { id: "references",       num: "",    title: "References",                            placeholder: "1. Author A, et al. Title. Journal. Year;Vol:Pages.\n2. ..." },
];

// ── State ──
const state = {
  sections: Object.fromEntries(SECTIONS.map(s => [s.id, ""])),
};

let autoSaveTimer = null;

// ── Init ──
renderSections();
loadFromStorage();
updatePreview();

// ── Render accordion sections ──
function renderSections() {
  const container = document.getElementById("sections-container");
  container.innerHTML = SECTIONS.map(s => `
    <div class="section-panel" id="section-${s.id}">
      <div class="section-head" onclick="toggleSection('${s.id}')">
        <div class="section-head-left">
          <span class="section-toggle">▶</span>
          ${s.num ? `<span class="section-num">${s.num}.</span>` : ""}
          <span class="section-name">${s.title}</span>
        </div>
        <span class="section-wc" id="wc-${s.id}">0 words</span>
      </div>
      <div class="section-body" id="body-${s.id}">
        <textarea
          id="content-${s.id}"
          rows="9"
          placeholder="${s.placeholder}"
          oninput="updateSection('${s.id}', this.value)"
          style="margin-bottom:8px"
        ></textarea>
        <input
          type="text"
          id="notes-${s.id}"
          class="notes-input"
          placeholder="✏️ Notes / hints for AI generation (optional) — e.g. 'focus on CAR-T and bispecifics post 2022'"
          onclick="event.stopPropagation()"
        />
        <div class="section-ai-actions">
          <button class="btn btn-ai btn-sm" onclick="generateDraft('${s.id}','${s.title}')">✨ Generate Draft</button>
          <button class="btn btn-ai btn-sm" onclick="improveSection('${s.id}','${s.title}')">✨ Improve</button>
          <button class="btn btn-outline btn-sm" onclick="getKeyPoints('${s.id}','${s.title}')">💡 Key Points</button>
        </div>
        <div class="ai-box" id="ai-${s.id}">
          <div class="ai-box-header">
            <span id="ai-label-${s.id}">✨ AI Suggestion</span>
            <button class="btn btn-secondary btn-sm" onclick="closeAiBox('${s.id}')">✕</button>
          </div>
          <div class="ai-box-content" id="ai-content-${s.id}"></div>
          <div class="ai-box-actions" id="ai-actions-${s.id}">
            <button class="btn btn-ai btn-sm" onclick="applyAiSuggestion('${s.id}')">Apply</button>
            <button class="btn btn-secondary btn-sm" onclick="closeAiBox('${s.id}')">Dismiss</button>
          </div>
        </div>
      </div>
    </div>
  `).join("");
}

// ── Accordion toggle ──
function toggleSection(id) {
  const panel = document.getElementById(`section-${id}`);
  panel.classList.toggle("open");
}

function openSection(id) {
  document.getElementById(`section-${id}`).classList.add("open");
}

// ── State updates ──
function updateSection(id, value) {
  state.sections[id] = value;
  updateWordCount(id);
  updateTotalWordCount();
  updatePreview();
  scheduleAutoSave();
}

function updateMeta() {
  updatePreview();
  scheduleAutoSave();
}

// ── Word count ──
function wordCount(text) {
  return text.trim() ? text.trim().split(/\s+/).length : 0;
}

function updateWordCount(id) {
  const wc = wordCount(state.sections[id] || "");
  document.getElementById(`wc-${id}`).textContent = `${wc} words`;
}

function updateTotalWordCount() {
  const total = Object.values(state.sections).reduce((sum, t) => sum + wordCount(t), 0);
  const title = document.getElementById("article-title").value;
  const authors = document.getElementById("authors").value;
  const keywords = document.getElementById("keywords").value;
  const metaWc = wordCount(title) + wordCount(authors) + wordCount(keywords);
  document.getElementById("total-wc").textContent = `${total + metaWc} words`;
}

// ── Preview ──
function htmlEsc(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function updatePreview() {
  const title = document.getElementById("article-title")?.value.trim() || "";
  const authors = document.getElementById("authors")?.value.trim() || "";
  const keywords = document.getElementById("keywords")?.value.trim() || "";
  const hasContent = title || authors || SECTIONS.some(s => state.sections[s.id]);

  if (!hasContent) {
    document.getElementById("article-preview").innerHTML = `<div class="p-empty">Fill in the details on the left to preview your article here.</div>`;
    return;
  }

  let html = "";

  if (title) html += `<div class="p-title">${htmlEsc(title)}</div>`;
  if (authors) html += `<div class="p-authors">${htmlEsc(authors)}</div>`;

  const abstract = state.sections["abstract"];
  if (abstract) {
    html += `<div class="p-abstract-box"><div class="p-abstract-label">Abstract</div><div class="p-body">${htmlEsc(abstract)}</div></div>`;
  }

  if (keywords) {
    html += `<div class="p-keywords"><strong>Keywords:</strong> ${htmlEsc(keywords)}</div>`;
  }

  // Numbered body sections
  let num = 1;
  for (const s of SECTIONS) {
    if (s.id === "abstract") continue;
    const content = state.sections[s.id];
    if (!content?.trim()) continue;

    if (s.id === "references") {
      html += `<div class="p-section-title">References</div><div class="p-body">${htmlEsc(content)}</div>`;
    } else {
      html += `<div class="p-section-title">${num}. ${htmlEsc(s.title)}</div><div class="p-body">${htmlEsc(content)}</div>`;
      num++;
    }
  }

  document.getElementById("article-preview").innerHTML = html;
}

// ── Streaming helper ──
async function streamToAiBox(url, body, sectionId, label, canApply) {
  openSection(sectionId);
  const box = document.getElementById(`ai-${sectionId}`);
  const contentEl = document.getElementById(`ai-content-${sectionId}`);
  const actionsEl = document.getElementById(`ai-actions-${sectionId}`);
  const labelEl = document.getElementById(`ai-label-${sectionId}`);

  box.classList.add("visible");
  labelEl.textContent = label;
  contentEl.innerHTML = `<span class="ai-loading">✨ Generating...</span>`;
  actionsEl.style.display = canApply ? "" : "none";

  try {
    const resp = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });

    if (!resp.ok) { const e = await resp.json(); throw new Error(e.error); }

    contentEl.textContent = "";
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      contentEl.textContent += decoder.decode(value, { stream: true });
    }
  } catch (err) {
    contentEl.innerHTML = `<span style="color:#ef4444">Error: ${err.message}</span>`;
  }
}

// ── AI features ──
function getTopic() {
  return document.getElementById("medical-topic")?.value.trim() || "";
}

function generateDraft(id, title) {
  const notes = document.getElementById(`notes-${id}`)?.value || "";
  const topic = getTopic();
  const pubmedContext = getSelectedPubmedContext();
  streamToAiBox("/api/generate", { sectionId: id, sectionTitle: title, notes, topic, pubmedContext }, id, "✨ Generated Draft", true);
}

function improveSection(id, title) {
  const content = state.sections[id];
  if (!content?.trim()) { showToast("Please write something in this section first.", "error"); return; }
  const topic = getTopic();
  const pubmedContext = getSelectedPubmedContext();
  streamToAiBox("/api/improve", { sectionTitle: title, content, topic, pubmedContext }, id, "✨ Improved Text", true);
}

function getKeyPoints(id, title) {
  const topic = getTopic();
  streamToAiBox("/api/keypoints", { sectionId: id, sectionTitle: title, topic }, id, "💡 Key Points to Cover", false);
}

function applyAiSuggestion(id) {
  const suggestion = document.getElementById(`ai-content-${id}`)?.textContent.trim();
  if (!suggestion) return;
  const textarea = document.getElementById(`content-${id}`);
  if (textarea) {
    textarea.value = suggestion;
    updateSection(id, suggestion);
  }
  closeAiBox(id);
  showToast("Applied!", "success");
}

function closeAiBox(id) {
  document.getElementById(`ai-${id}`)?.classList.remove("visible");
}

// ── PDF export ──
function downloadPDF() {
  const title = document.getElementById("article-title").value || "article";
  const el = document.getElementById("article-preview");

  const opt = {
    margin: 0,
    filename: `${title.replace(/[^a-zA-Z0-9\s]/g, "").replace(/\s+/g, "_").slice(0, 60)}.pdf`,
    image: { type: "jpeg", quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
    pagebreak: { mode: ["avoid-all", "css", "legacy"] },
  };

  showToast("Generating PDF...");
  html2pdf().set(opt).from(el).save().then(() => showToast("PDF downloaded!", "success"));
}

// ── DOCX export ──
async function downloadDOCX() {
  showToast("Generating DOCX...");

  const title = document.getElementById("article-title").value.trim();
  const authors = document.getElementById("authors").value.trim();
  const keywords = document.getElementById("keywords").value.trim();

  const sections = SECTIONS.map(s => ({
    id: s.id,
    title: s.num ? `${s.num}. ${s.title}` : s.title,
    content: state.sections[s.id] || "",
  }));

  try {
    const resp = await fetch("/api/export-docx", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title, authors, keywords, sections }),
    });

    if (!resp.ok) { const e = await resp.json(); throw new Error(e.error); }

    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${(title || "review_article").replace(/[^a-zA-Z0-9\s]/g, "").replace(/\s+/g, "_").slice(0, 60)}.docx`;
    a.click();
    URL.revokeObjectURL(url);
    showToast("DOCX downloaded!", "success");
  } catch (err) {
    showToast("Error: " + err.message, "error");
  }
}

// ── Auto-save ──
function scheduleAutoSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    localStorage.setItem("mm-article", JSON.stringify({
      topic: document.getElementById("medical-topic").value,
      title: document.getElementById("article-title").value,
      authors: document.getElementById("authors").value,
      keywords: document.getElementById("keywords").value,
      sections: state.sections,
    }));
  }, 1500);
}

function loadFromStorage() {
  try {
    const saved = localStorage.getItem("mm-article");
    if (!saved) return;
    const data = JSON.parse(saved);
    if (data.topic) document.getElementById("medical-topic").value = data.topic;
    if (data.title) document.getElementById("article-title").value = data.title;
    if (data.authors) document.getElementById("authors").value = data.authors;
    if (data.keywords) document.getElementById("keywords").value = data.keywords;
    if (data.sections) {
      for (const [id, content] of Object.entries(data.sections)) {
        state.sections[id] = content;
        const el = document.getElementById(`content-${id}`);
        if (el) el.value = content;
      }
    }
    SECTIONS.forEach(s => updateWordCount(s.id));
    updateTotalWordCount();
  } catch (e) { /* ignore */ }
}

// ── Clear all ──
function clearAll() {
  if (!confirm("Clear all article content? This cannot be undone.")) return;
  document.getElementById("medical-topic").value = "";
  document.getElementById("article-title").value = "";
  document.getElementById("authors").value = "";
  document.getElementById("keywords").value = "";
  SECTIONS.forEach(s => {
    state.sections[s.id] = "";
    const el = document.getElementById(`content-${s.id}`);
    if (el) el.value = "";
    updateWordCount(s.id);
    closeAiBox(s.id);
  });
  updateTotalWordCount();
  updatePreview();
  localStorage.removeItem("mm-article");
  showToast("Cleared.", "success");
}

// ── PubMed search ──
let pubmedArticles = [];

async function searchPubMed() {
  const queryEl = document.getElementById("pubmed-query");
  const topic = getTopic();
  const query = queryEl.value.trim() || topic;
  if (!query) { showToast("Enter a search query or set a Medical Topic first.", "error"); return; }

  const btn = document.getElementById("pubmed-btn");
  const resultsEl = document.getElementById("pubmed-results");
  btn.disabled = true;
  btn.textContent = "Searching...";
  resultsEl.innerHTML = `<div class="pubmed-empty">Searching PubMed...</div>`;

  try {
    const resp = await fetch("/api/pubmed-search", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query, maxResults: 10 }),
    });
    if (!resp.ok) { const e = await resp.json(); throw new Error(e.error); }
    const data = await resp.json();
    pubmedArticles = data.articles || [];
    renderPubmedResults();
  } catch (err) {
    resultsEl.innerHTML = `<div class="pubmed-empty" style="color:#ef4444">Error: ${err.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = "Search";
  }
}

function renderPubmedResults() {
  const el = document.getElementById("pubmed-results");
  if (!pubmedArticles.length) {
    el.innerHTML = `<div class="pubmed-empty">No results found.</div>`;
    return;
  }
  el.innerHTML = pubmedArticles.map((a, i) => `
    <div class="pubmed-article" id="pm-${i}">
      <div class="pubmed-article-title">${htmlEsc(a.title)}</div>
      <div class="pubmed-article-meta">${htmlEsc(a.authors)} &bull; ${htmlEsc(a.journal)} ${htmlEsc(a.year)} &bull; PMID: ${htmlEsc(a.pmid)}</div>
      <div class="pubmed-article-abstract" id="pm-abs-${i}">${htmlEsc(a.abstract || "No abstract available.")}</div>
      ${(a.abstract && a.abstract.length > 200) ? `<span class="pubmed-expand" onclick="toggleAbstract(${i})">Show more</span>` : ""}
      <div>
        <button class="btn btn-pubmed btn-sm pubmed-use-btn" onclick="insertReference(${i})">+ Add to References</button>
        <button class="btn btn-outline btn-sm pubmed-use-btn" onclick="togglePubmedSelect(${i})" id="pm-sel-${i}">Use in AI</button>
      </div>
    </div>
  `).join("");
}

function toggleAbstract(i) {
  const el = document.getElementById(`pm-abs-${i}`);
  const isExpanded = el.classList.toggle("expanded");
  el.nextElementSibling.textContent = isExpanded ? "Show less" : "Show more";
}

const selectedPubmed = new Set();

function togglePubmedSelect(i) {
  const btn = document.getElementById(`pm-sel-${i}`);
  if (selectedPubmed.has(i)) {
    selectedPubmed.delete(i);
    btn.textContent = "Use in AI";
    btn.classList.remove("btn-ai");
    btn.classList.add("btn-outline");
  } else {
    selectedPubmed.add(i);
    btn.textContent = "✓ Using in AI";
    btn.classList.remove("btn-outline");
    btn.classList.add("btn-ai");
  }
}

function getSelectedPubmedContext() {
  if (!selectedPubmed.size) return "";
  return [...selectedPubmed].map(i => {
    const a = pubmedArticles[i];
    if (!a) return "";
    return `Title: ${a.title}\nAuthors: ${a.authors}\nJournal: ${a.journal} (${a.year})\nAbstract: ${a.abstract || "N/A"}`;
  }).filter(Boolean).join("\n\n---\n\n");
}

function insertReference(i) {
  const a = pubmedArticles[i];
  if (!a) return;
  const ref = `${a.authors}. ${a.title}. ${a.journal}. ${a.year}. PMID: ${a.pmid}.`;
  const current = state.sections["references"] || "";
  const lines = current.trim().split("\n").filter(l => l.trim());
  const num = lines.length + 1;
  const newContent = current.trim() ? `${current.trim()}\n${num}. ${ref}` : `1. ${ref}`;
  state.sections["references"] = newContent;
  const el = document.getElementById("content-references");
  if (el) el.value = newContent;
  updateWordCount("references");
  updateTotalWordCount();
  updatePreview();
  scheduleAutoSave();
  showToast("Reference added!", "success");
}

// ── Toast ──
function showToast(msg, type = "") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.classList.remove("show"), 3000);
}
</script>
