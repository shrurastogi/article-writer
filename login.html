<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Medical Article Writer</title>
  <link rel="stylesheet" href="/css/login.css" />
</head>
<body>
  <div class="logo-wrap">
    <svg width="48" height="24" viewBox="0 0 48 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="GSK">
      <text x="0" y="19" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#F36633">GSK</text>
    </svg>
    <span class="logo-text">Medical Article Writer</span>
  </div>

  <div class="card">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to continue writing</p>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Sign in</button>
      <button class="tab-btn" onclick="switchTab('register')">Create account</button>
    </div>

    <!-- Sign in pane -->
    <div id="pane-login" class="tab-pane active">
      <div id="login-error" class="error-box"></div>
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" autocomplete="email" required placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" autocomplete="current-password" required placeholder="••••••••" />
        </div>
        <button type="submit" class="btn-primary" id="login-btn">Sign in</button>
      </form>

      <div class="divider">or</div>

      <a href="/auth/google" style="text-decoration:none;">
        <button class="btn-google">
          <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
            <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
      </a>
    </div>

    <!-- Register pane -->
    <div id="pane-register" class="tab-pane">
      <div id="register-error" class="error-box"></div>
      <form id="register-form" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="reg-name">Full name</label>
          <input id="reg-name" type="text" autocomplete="name" required placeholder="Dr. Jane Smith" />
        </div>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input id="reg-email" type="email" autocomplete="email" required placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="reg-password">Password <span style="font-weight:400;color:var(--text-muted)">(min 8 characters)</span></label>
          <input id="reg-password" type="password" autocomplete="new-password" required minlength="8" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn-primary" id="register-btn">Create account</button>
      </form>

      <div class="divider">or</div>

      <a href="/auth/google" style="text-decoration:none;">
        <button class="btn-google">
          <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
            <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
      </a>
    </div>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
