<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Medical Article Writer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:      #F36633;
      --primary-dark: #D4551A;
      --navy:         #1A1F71;
      --bg:           #f8f4f1;
      --card-bg:      #ffffff;
      --border:       #e8e0d8;
      --text:         #2c2c2c;
      --text-muted:   #6b6b6b;
      --error-bg:     #fff0ee;
      --error-border: #f5b8a8;
      --error-text:   #c0392b;
      --radius:       10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text);
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .logo-text {
      font-size: 18px;
      font-weight: 600;
      color: var(--navy);
      letter-spacing: -0.3px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    .card h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 6px;
    }
    .card .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--border);
      margin-bottom: 24px;
    }
    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 10px 0;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(243,102,51,0.12);
    }

    .btn-primary {
      width: 100%;
      padding: 11px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text-muted);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-google {
      width: 100%;
      padding: 10px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-google:hover { background: #f7f7f7; border-color: #ccc; }

    .error-box {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error-text);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .error-box.visible { display: block; }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <svg width="48" height="24" viewBox="0 0 48 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="GSK">
      <text x="0" y="19" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#F36633">GSK</text>
    </svg>
    <span class="logo-text">Medical Article Writer</span>
  </div>

  <div class="card">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to continue writing</p>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Sign in</button>
      <button class="tab-btn" onclick="switchTab('register')">Create account</button>
    </div>

    <!-- Sign in pane -->
    <div id="pane-login" class="tab-pane active">
      <div id="login-error" class="error-box"></div>
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" autocomplete="email" required placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" autocomplete="current-password" required placeholder="••••••••" />
        </div>
        <button type="submit" class="btn-primary" id="login-btn">Sign in</button>
      </form>

      <div class="divider">or</div>

      <a href="/auth/google" style="text-decoration:none;">
        <button class="btn-google">
          <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
            <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
      </a>
    </div>

    <!-- Register pane -->
    <div id="pane-register" class="tab-pane">
      <div id="register-error" class="error-box"></div>
      <form id="register-form" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="reg-name">Full name</label>
          <input id="reg-name" type="text" autocomplete="name" required placeholder="Dr. Jane Smith" />
        </div>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input id="reg-email" type="email" autocomplete="email" required placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="reg-password">Password <span style="font-weight:400;color:var(--text-muted)">(min 8 characters)</span></label>
          <input id="reg-password" type="password" autocomplete="new-password" required minlength="8" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn-primary" id="register-btn">Create account</button>
      </form>

      <div class="divider">or</div>

      <a href="/auth/google" style="text-decoration:none;">
        <button class="btn-google">
          <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
            <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
      </a>
    </div>
  </div>

  <script>
    // Show error from query string (e.g. ?error=auth_failed from OAuth callback)
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get("error") === "auth_failed") {
      showError("login-error", "Google sign-in failed. Please try again.");
    }

    function switchTab(tab) {
      document.querySelectorAll(".tab-btn").forEach((b, i) => {
        b.classList.toggle("active", (i === 0 && tab === "login") || (i === 1 && tab === "register"));
      });
      document.getElementById("pane-login").classList.toggle("active", tab === "login");
      document.getElementById("pane-register").classList.toggle("active", tab === "register");
      hideError("login-error");
      hideError("register-error");
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add("visible");
    }
    function hideError(id) {
      document.getElementById(id).classList.remove("visible");
    }

    async function handleLogin(e) {
      e.preventDefault();
      hideError("login-error");
      const btn = document.getElementById("login-btn");
      btn.disabled = true;
      btn.textContent = "Signing in…";

      try {
        const res = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.getElementById("login-email").value,
            password: document.getElementById("login-password").value,
          }),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = "/dashboard";
        } else {
          showError("login-error", data.error || "Sign in failed.");
          btn.disabled = false;
          btn.textContent = "Sign in";
        }
      } catch {
        showError("login-error", "Network error. Please try again.");
        btn.disabled = false;
        btn.textContent = "Sign in";
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      hideError("register-error");
      const btn = document.getElementById("register-btn");
      btn.disabled = true;
      btn.textContent = "Creating account…";

      try {
        const res = await fetch("/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: document.getElementById("reg-name").value,
            email: document.getElementById("reg-email").value,
            password: document.getElementById("reg-password").value,
          }),
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = "/dashboard";
        } else {
          showError("register-error", data.error || "Registration failed.");
          btn.disabled = false;
          btn.textContent = "Create account";
        }
      } catch {
        showError("register-error", "Network error. Please try again.");
        btn.disabled = false;
        btn.textContent = "Create account";
      }
    }
  </script>
</body>
</html>
