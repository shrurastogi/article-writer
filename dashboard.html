<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Articles — Medical Article Writer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:      #F36633;
      --primary-dark: #D4551A;
      --navy:         #1A1F71;
      --bg:           #f8f4f1;
      --card-bg:      #ffffff;
      --border:       #e8e0d8;
      --text:         #2c2c2c;
      --text-muted:   #6b6b6b;
      --danger:       #c0392b;
      --danger-bg:    #fff0ee;
      --radius:       10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
    }

    /* ── Header ─────────────────────────────────────────────────────────────── */
    header {
      background: var(--navy);
      color: #fff;
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-text {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }
    .logo-divider {
      width: 1px;
      height: 20px;
      background: rgba(255,255,255,0.3);
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .user-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);
      object-fit: cover;
    }
    .user-avatar-placeholder {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .user-name {
      font-size: 13px;
      color: rgba(255,255,255,0.85);
    }
    .btn-signout {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.35);
      color: rgba(255,255,255,0.85);
      border-radius: 5px;
      padding: 5px 12px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-signout:hover { background: rgba(255,255,255,0.1); }

    /* ── Main content ───────────────────────────────────────────────────────── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .page-header h1 {
      font-size: 26px;
      font-weight: 700;
      color: var(--navy);
    }

    .btn-new {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-new:hover { background: var(--primary-dark); }
    .btn-new:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-new .plus { font-size: 18px; line-height: 1; }

    /* ── Article cards ──────────────────────────────────────────────────────── */
    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
    }

    .article-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: box-shadow 0.15s, border-color 0.15s;
      position: relative;
    }
    .article-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      border-color: #d0c8c0;
    }

    .article-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .article-topic {
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 14px;
      min-height: 18px;
    }
    .article-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--text-muted);
    }
    .article-words {
      background: #f0ece8;
      border-radius: 4px;
      padding: 2px 7px;
      font-weight: 600;
    }

    .delete-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: none;
      border: none;
      color: #ccc;
      font-size: 16px;
      cursor: pointer;
      border-radius: 4px;
      padding: 2px 5px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }
    .delete-btn:hover {
      color: var(--danger);
      background: var(--danger-bg);
    }

    /* ── Empty state ────────────────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h2 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
    .empty-state p  { font-size: 14px; margin-bottom: 24px; }

    /* ── Loading skeleton ───────────────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, #ede8e4 25%, #e4dfd9 50%, #ede8e4 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton-card {
      height: 110px;
      border-radius: var(--radius);
    }

    /* ── Delete confirm modal ───────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 28px 32px;
      max-width: 380px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .modal h3 { font-size: 17px; color: var(--text); margin-bottom: 10px; }
    .modal p  { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-cancel {
      padding: 8px 16px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-cancel:hover { background: #f5f5f5; }
    .btn-delete {
      padding: 8px 16px;
      background: var(--danger);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-delete:hover { background: #a93226; }
    .btn-delete:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <svg width="48" height="24" viewBox="0 0 48 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="GSK">
        <text x="0" y="19" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#F36633">GSK</text>
      </svg>
      <div class="logo-divider"></div>
      <span class="logo-text">Medical Article Writer</span>
    </div>
    <div class="header-right" id="user-widget" style="display:none">
      <span id="user-avatar-wrap"></span>
      <span class="user-name" id="user-name"></span>
      <button class="btn-signout" onclick="signOut()">Sign out</button>
    </div>
  </header>

  <main>
    <div class="page-header">
      <h1>My Articles</h1>
      <button class="btn-new" id="btn-new" onclick="createArticle()">
        <span class="plus">+</span> New article
      </button>
    </div>

    <div id="articles-container">
      <!-- Loading skeletons -->
      <div class="articles-grid" id="skeleton-grid">
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      </div>
    </div>
  </main>

  <!-- Delete confirmation modal -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal">
      <h3>Delete article?</h3>
      <p id="delete-modal-text">This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn-delete" id="confirm-delete-btn" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <script>
    let articles = [];
    let pendingDeleteId = null;

    // ── Bootstrap ──────────────────────────────────────────────────────────────

    async function init() {
      const user = await checkAuth();
      if (!user) return;
      hydrateUserWidget(user);
      await loadArticles();
    }

    async function checkAuth() {
      try {
        const res = await fetch("/auth/me");
        if (res.status === 401) {
          window.location.href = "/login";
          return null;
        }
        return await res.json();
      } catch {
        window.location.href = "/login";
        return null;
      }
    }

    function hydrateUserWidget(user) {
      const wrap = document.getElementById("user-avatar-wrap");
      if (user.avatarUrl) {
        const img = document.createElement("img");
        img.src = user.avatarUrl;
        img.alt = user.name;
        img.className = "user-avatar";
        wrap.appendChild(img);
      } else {
        const div = document.createElement("div");
        div.className = "user-avatar-placeholder";
        div.textContent = (user.name || "U")[0].toUpperCase();
        wrap.appendChild(div);
      }
      document.getElementById("user-name").textContent = user.name;
      document.getElementById("user-widget").style.display = "flex";
    }

    // ── Article list ───────────────────────────────────────────────────────────

    async function loadArticles() {
      try {
        const res = await fetch("/api/articles");
        if (!res.ok) throw new Error("Failed to load articles");
        const data = await res.json();
        articles = data.articles;
        renderArticles();
      } catch {
        document.getElementById("articles-container").innerHTML =
          '<p style="color:var(--danger);text-align:center;padding:40px 0">Failed to load articles. Please refresh.</p>';
      }
    }

    function renderArticles() {
      const container = document.getElementById("articles-container");

      if (!articles.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📄</div>
            <h2>No articles yet</h2>
            <p>Click <strong>+ New article</strong> to start writing your first review.</p>
          </div>`;
        return;
      }

      const grid = document.createElement("div");
      grid.className = "articles-grid";

      for (const a of articles) {
        const card = document.createElement("div");
        card.className = "article-card";
        card.onclick = () => openArticle(a._id);

        const updated = new Date(a.updatedAt);
        const dateStr = updated.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
        const words = a.wordCount ? `${a.wordCount.toLocaleString()} words` : "No content";

        card.innerHTML = `
          <button class="delete-btn" title="Delete article" onclick="openDeleteModal(event, '${a._id}', ${JSON.stringify(a.title)})">✕</button>
          <div class="article-title">${escHtml(a.title || "Untitled Article")}</div>
          <div class="article-topic">${escHtml(a.topic || "")}</div>
          <div class="article-meta">
            <span>Updated ${dateStr}</span>
            <span class="article-words">${words}</span>
          </div>`;

        grid.appendChild(card);
      }

      container.innerHTML = "";
      container.appendChild(grid);
    }

    // ── Actions ────────────────────────────────────────────────────────────────

    async function createArticle() {
      const btn = document.getElementById("btn-new");
      btn.disabled = true;
      btn.innerHTML = '<span class="plus">…</span> Creating…';

      try {
        const res = await fetch("/api/articles", { method: "POST" });
        if (!res.ok) throw new Error("Create failed");
        const data = await res.json();
        window.location.href = `/?id=${data.article._id}`;
      } catch {
        btn.disabled = false;
        btn.innerHTML = '<span class="plus">+</span> New article';
        alert("Failed to create article. Please try again.");
      }
    }

    function openArticle(id) {
      window.location.href = `/?id=${id}`;
    }

    // ── Delete modal ───────────────────────────────────────────────────────────

    function openDeleteModal(e, id, title) {
      e.stopPropagation();
      pendingDeleteId = id;
      document.getElementById("delete-modal-text").textContent =
        `"${title}" will be permanently deleted. This cannot be undone.`;
      document.getElementById("delete-modal").classList.add("visible");
    }

    function closeDeleteModal() {
      pendingDeleteId = null;
      document.getElementById("delete-modal").classList.remove("visible");
    }

    async function confirmDelete() {
      if (!pendingDeleteId) return;
      const btn = document.getElementById("confirm-delete-btn");
      btn.disabled = true;
      btn.textContent = "Deleting…";

      try {
        const res = await fetch(`/api/articles/${pendingDeleteId}`, { method: "DELETE" });
        if (!res.ok && res.status !== 204) throw new Error("Delete failed");
        articles = articles.filter(a => a._id !== pendingDeleteId);
        closeDeleteModal();
        renderArticles();
      } catch {
        btn.disabled = false;
        btn.textContent = "Delete";
        alert("Failed to delete article. Please try again.");
      }
    }

    // ── Auth ───────────────────────────────────────────────────────────────────

    async function signOut() {
      await fetch("/auth/logout", { method: "POST" });
      window.location.href = "/login";
    }

    // ── Util ───────────────────────────────────────────────────────────────────

    function escHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    // Close modal on overlay click
    document.getElementById("delete-modal").addEventListener("click", function(e) {
      if (e.target === this) closeDeleteModal();
    });

    init();

    fetch('/api/version').then(r => r.json()).then(v => {
      const isDev = v.env !== 'production';
      const badge = document.createElement('div');
      badge.id = 'version-badge';
      badge.style.cssText = [
        'position:fixed', 'bottom:8px', 'right:12px', 'font-size:11px',
        'padding:2px 8px', 'border-radius:10px', 'pointer-events:none',
        isDev ? 'background:#1d4ed8;color:#fff;opacity:0.8' : 'background:#6b7280;color:#fff;opacity:0.6'
      ].join(';');
      badge.textContent = `v${v.version} · ${String(v.sha).slice(0, 7)}`;
      document.body.appendChild(badge);
    }).catch(() => {});
  </script>
</body>
</html>
